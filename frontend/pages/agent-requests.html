<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../js/auth-guard.js"></script>
  <title>Demandes reçues - TransaLink</title>
  <script>
    (function () {
      const theme = localStorage.getItem("transalink_theme");
      const fontScale = localStorage.getItem("transalink_font_scale") || "100";

      document.documentElement.style.fontSize = fontScale + "%";

      if (theme === "dark") {
        document.documentElement.classList.add("dark-mode-preload");
      }
    })();
  </script>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body class="app-body">
  <main class="mobile-app transaction-app">

    <header class="app-header">
      <button class="icon-btn" onclick="goBack()">←</button>
      <div>
        <h1>Demandes reçues</h1>
        <p>Valider, refuser ou marquer envoyé</p>
      </div>
      <button class="icon-btn" onclick="loadTransactions()">⟳</button>
    </header>

    <section class="requests-page">
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Rechercher numéro ou montant..." oninput="applyFilters()" />

        <select id="statusFilter" onchange="applyFilters()">
          <option value="all">Tous statuts</option>
          <option value="pending">En attente</option>
          <option value="approved">Validées</option>
          <option value="sent">Envoyées</option>
          <option value="rejected">Refusées</option>
          <option value="cancelled">Annulées</option>
        </select>

        <select id="periodFilter" onchange="applyFilters()">
          <option value="today">Aujourd’hui</option>
          <option value="week">Cette semaine</option>
          <option value="month">Ce mois</option>
          <option value="all">Tout</option>
        </select>
        <button type="button" class="calendar-filter-btn" onclick="openDateModal()">
          📅
          <span id="selectedDateLabel">Date</span>
        </button>
      </div>

      <div class="mini-summary" id="miniSummary"></div>

      <div id="requestsList" class="requests-list">
        <p class="empty-text">Chargement des demandes...</p>
      </div>

      <div class="pagination-box" id="paginationBox"></div>
    </section>

  </main>
  <script src="../js/config.js"></script>
  <script src="../js/app-settings.js"></script>
  <script src="../js/app-nav.js"></script>
  <script>

    const token = localStorage.getItem("transalink_token");
    const user = JSON.parse(localStorage.getItem("transalink_user"));

    if (!token || !user || user.role !== "agent") {
      window.location.href = "../index.html";
    }

    const headers = {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    };

    const requestsList = document.getElementById("requestsList");
    const paginationBox = document.getElementById("paginationBox");
    const miniSummary = document.getElementById("miniSummary");

    let allTransactions = [];
    let filteredTransactions = [];
    let currentPage = 1;
    const itemsPerPage = 10;

    let mediaRecorder = null;
    let audioChunks = [];
    let agentAudioBlob = null;
    let audioStream = null;

    function formatMoney(amount) {
      return Number(amount || 0).toLocaleString("fr-FR") + " FC";
    }

    function showPopup(type, title, message) {
      const oldPopup = document.getElementById("appPopup");
      if (oldPopup) oldPopup.remove();

      const isSuccess = type === "success";

      document.body.insertAdjacentHTML("beforeend", `
    <div class="custom-modal" id="appPopup" style="z-index:99999;">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h2>${isSuccess ? "✅" : "❌"} ${title}</h2>
        <p>${message}</p>

        <div class="modal-actions">
          <button type="button" class="small-btn ${isSuccess ? "success-btn" : "danger-btn"}" onclick="closePopup(event)">
            OK
          </button>
        </div>
      </div>
    </div>
  `);
    }

    function closePopup(event) {
      if (event) event.stopPropagation();
      const popup = document.getElementById("appPopup");
      if (popup) popup.remove();
    }
    function formatDate(date) {
      return new Date(date).toLocaleString("fr-FR", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function statusLabel(status) {
      const labels = {
        pending: "En attente",
        approved: "Validée",
        sent: "Envoyée",
        rejected: "Refusée",
        cancelled: "Annulée"
      };
      return labels[status] || status;
    }

    function isSameDay(date1, date2) {
      return date1.getFullYear() === date2.getFullYear() &&
        date1.getMonth() === date2.getMonth() &&
        date1.getDate() === date2.getDate();
    }

    function isSameWeek(date) {
      const today = new Date();
      const currentDay = today.getDay() || 7;

      const monday = new Date(today);
      monday.setDate(today.getDate() - currentDay + 1);
      monday.setHours(0, 0, 0, 0);

      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      sunday.setHours(23, 59, 59, 999);

      return date >= monday && date <= sunday;
    }

    function isSameMonth(date) {
      const today = new Date();
      return date.getFullYear() === today.getFullYear() &&
        date.getMonth() === today.getMonth();
    }
    let selectedDateFilter = "";

    function openDateModal() {
      const oldModal = document.getElementById("dateModal");
      if (oldModal) oldModal.remove();

      document.body.insertAdjacentHTML("beforeend", `
    <div class="custom-modal" id="dateModal" onclick="closeDateModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h2>📅 Filtrer par date</h2>
        <p>Choisis une date précise pour afficher seulement les demandes de ce jour.</p>

        <label>Date voulue</label>
        <input type="date" id="singleDateInput" value="${selectedDateFilter}" />

        <div class="modal-actions">
          <button class="small-btn danger-btn" onclick="clearDateFilter()">Effacer</button>
          <button class="small-btn success-btn" onclick="applySingleDateFilter()">Appliquer</button>
        </div>
      </div>
    </div>
  `);
    }

    function closeDateModal() {
      const modal = document.getElementById("dateModal");
      if (modal) modal.remove();
    }

    function applySingleDateFilter() {
      selectedDateFilter = document.getElementById("singleDateInput").value;

      document.getElementById("selectedDateLabel").textContent = selectedDateFilter
        ? new Date(selectedDateFilter).toLocaleDateString("fr-FR")
        : "Date";

      closeDateModal();
      applyFilters();
    }

    function clearDateFilter() {
      selectedDateFilter = "";
      document.getElementById("selectedDateLabel").textContent = "Date";
      closeDateModal();
      applyFilters();
    }

    function isSelectedDate(date) {
      if (!selectedDateFilter) return true;

      const selected = new Date(selectedDateFilter);
      const target = new Date(date);

      return selected.getFullYear() === target.getFullYear() &&
        selected.getMonth() === target.getMonth() &&
        selected.getDate() === target.getDate();
    }

    function getPeriodTitle(period) {
      const titles = {
        today: "Demandes reçues aujourd’hui",
        week: "Demandes reçues cette semaine",
        month: "Demandes reçues ce mois",
        all: "Toutes les demandes reçues"
      };

      return titles[period] || "Demandes reçues";
    }

    function renderActions(t) {
      if (t.status === "pending") {
        return `
          <button class="small-btn success-btn" onclick="updateStatus(${t.id}, 'approved')">✅ Valider</button>
          <button class="small-btn danger-btn" onclick="openRejectModal(${t.id})">❌ Refuser</button>
        `;
      }

      if (t.status === "approved") {
        return `
          <button class="small-btn primary-small-btn" onclick="openSentModal(${t.id}, ${t.amount})">📤 Marquer envoyé</button>
        `;
      }

      return `<span class="final-status">${statusLabel(t.status)}</span>`;
    }

    async function loadTransactions() {
      requestsList.innerHTML = `<p class="empty-text">Chargement des demandes...</p>`;
      paginationBox.innerHTML = "";
      miniSummary.innerHTML = "";

      try {
        const res = await fetch(`${API_URL}/transactions`, { headers });
        const data = await res.json();

        if (!data.success) {
          requestsList.innerHTML = `<p class="error">${data.message}</p>`;
          return;
        }

        allTransactions = (data.transactions || [])
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        applyFilters();

      } catch (error) {
        requestsList.innerHTML = `<p class="error">Serveur indisponible</p>`;
      }
    }

    function applyFilters() {
      const search = document.getElementById("searchInput").value.toLowerCase().trim();
      const status = document.getElementById("statusFilter").value;
      const period = document.getElementById("periodFilter").value;
      const today = new Date();

      filteredTransactions = allTransactions.filter(t => {
        const createdAt = new Date(t.created_at);

        const matchStatus = status === "all" || t.status === status;

        const matchSearch =
          !search ||
          String(t.phone).toLowerCase().includes(search) ||
          String(t.amount).toLowerCase().includes(search) ||
          String(t.created_by_name || "").toLowerCase().includes(search) ||
          String(t.original_message || "").toLowerCase().includes(search) ||
          String(t.final_message || "").toLowerCase().includes(search) ||
          String(t.rejection_reason || "").toLowerCase().includes(search);

        let matchPeriod = true;

        if (selectedDateFilter) {
          matchPeriod = isSelectedDate(createdAt);
        } else {
          if (period === "today") {
            matchPeriod = isSameDay(createdAt, today);
          } else if (period === "week") {
            matchPeriod = isSameWeek(createdAt);
          } else if (period === "month") {
            matchPeriod = isSameMonth(createdAt);
          }
        }

        return matchStatus && matchSearch && matchPeriod;
      });

      currentPage = 1;
      renderRequests();
    }

    function renderSummary() {
      const period = document.getElementById("periodFilter").value;
      const totalAmount = filteredTransactions.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const pendingCount = filteredTransactions.filter(t => t.status === "pending").length;

      miniSummary.innerHTML = `
        <div class="summary-line">
          <strong>${getPeriodTitle(period)}</strong>
          <span>${filteredTransactions.length} demande(s) • ${formatMoney(totalAmount)} • ${pendingCount} en attente</span>
        </div>
      `;
    }

    function renderRequests() {
      renderSummary();

      if (!filteredTransactions || filteredTransactions.length === 0) {
        requestsList.innerHTML = `<p class="empty-text">Aucune demande trouvée pour cette période.</p>`;
        paginationBox.innerHTML = "";
        return;
      }

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredTransactions.slice(start, end);

      requestsList.innerHTML = pageItems.map(t => `
        <article class="request-card compact-request-card">
          <div class="request-top">
            <div>
              <h3>${formatMoney(t.amount)}</h3>
              <p>${t.phone}</p>
            </div>
            <span class="status-pill ${t.status}">${statusLabel(t.status)}</span>
          </div>

          ${t.original_message ? `
            <p class="compact-response">💬 ${t.original_message}</p>
          ` : ""}

          ${t.final_message ? `
            <p class="compact-response success">✅ ${t.final_message}</p>
          ` : ""}

          ${t.rejection_reason ? `
            <p class="compact-response error">❌ ${t.rejection_reason}</p>
          ` : ""}

          <div class="request-info compact-info">
            <p><strong>Créée par :</strong> ${t.created_by_name || "Terrain"}</p>
            <p><strong>Date :</strong> ${formatDate(t.created_at)}</p>
          </div>

          <div class="request-actions">
            <button class="small-btn primary-small-btn" onclick="openDetails(${t.id})">Voir détails</button>
            ${renderActions(t)}
          </div>
        </article>
      `).join("");

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);

      if (totalPages <= 1) {
        paginationBox.innerHTML = "";
        return;
      }

      paginationBox.innerHTML = `
        <button class="small-btn" onclick="prevPage()" ${currentPage === 1 ? "disabled" : ""}>← Précédent</button>
        <span>Page ${currentPage} / ${totalPages}</span>
        <button class="small-btn" onclick="nextPage()" ${currentPage === totalPages ? "disabled" : ""}>Suivant →</button>
      `;
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderRequests();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);

      if (currentPage < totalPages) {
        currentPage++;
        renderRequests();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function openDetails(id) {
      const t = allTransactions.find(item => Number(item.id) === Number(id));
      if (!t) return;

      const oldModal = document.getElementById("detailsModal");
      if (oldModal) oldModal.remove();

      const terrainAudioUrl = t.terrain_audio_url ? `${BASE_URL}${t.terrain_audio_url}` : "";
      const agentAudioUrl = t.agent_audio_url ? `${BASE_URL}${t.agent_audio_url}` : "";
      const receiptUrl = t.receipt_image_url ? `${BASE_URL}${t.receipt_image_url}` : "";

      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="detailsModal" onclick="closeDetails()">
          <div class="modal-box details-modal-box" onclick="event.stopPropagation()">
            <h2>Détails demande</h2>
            <p>${formatMoney(t.amount)} • ${t.phone}</p>

            ${t.original_message ? `
              <div class="original-message-box">
                <span>Message reçu</span>
                <strong>${t.original_message}</strong>
              </div>
            ` : ""}

            ${terrainAudioUrl ? `
              <div class="audio-player-box">
                <div>
                  <strong>🎙️ Audio terrain</strong>
                  <small>Preuve vocale liée à cette demande</small>
                </div>
                <audio controls src="${terrainAudioUrl}"></audio>
              </div>
            ` : ""}

            ${agentAudioUrl ? `
              <div class="audio-player-box agent-audio-box">
                <div>
                  <strong>🎧 Audio agent</strong>
                  <small>Réponse vocale liée à cette demande</small>
                </div>
                <audio controls src="${agentAudioUrl}"></audio>
              </div>
            ` : ""}

            ${receiptUrl ? `
              <button type="button" class="receipt-thumb" onclick="openImageModal('${receiptUrl}')">
                <img src="${receiptUrl}" alt="Capture transaction" />
                <span>Voir capture en grand</span>
              </button>
            ` : ""}

            <div class="request-info">
              <p><strong>Statut :</strong> ${statusLabel(t.status)}</p>
              <p><strong>Créée par :</strong> ${t.created_by_name || "Terrain"}</p>
              <p><strong>Date :</strong> ${formatDate(t.created_at)}</p>
              ${t.note ? `<p><strong>Note :</strong> ${t.note}</p>` : ""}
              ${t.final_message ? `<p class="success"><strong>Réponse :</strong> ${t.final_message}</p>` : ""}
              ${t.rejection_reason ? `<p class="error"><strong>Refus :</strong> ${t.rejection_reason}</p>` : ""}
            </div>

            <div class="modal-actions">
              <button class="small-btn danger-btn" onclick="closeDetails()">Fermer</button>
            </div>
          </div>
        </div>
      `);
    }

    function closeDetails() {
      const modal = document.getElementById("detailsModal");
      if (modal) modal.remove();
    }

    async function updateStatus(id, status, extraData = {}) {
      try {
        const res = await fetch(`${API_URL}/transactions/status/${id}`, {
          method: "PUT",
          headers,
          body: JSON.stringify({
            status,
            validated_by: user.id,
            ...extraData
          })
        });

        const data = await res.json();

        if (!data.success) {
          showPopup("error", "Erreur", `${data.message || "Erreur"} ${data.error || ""}`);
          return;
        }

        if (agentAudioBlob) {
          await uploadAgentAudio(id);
        }

        closeModal();
        loadTransactions();

      } catch (error) {
        showPopup("error", "Serveur indisponible", error.message || "Impossible de contacter le serveur.");
      }
    }

    function openSentModal(id, amount) {
      resetAgentAudio();
      closeModal();

      const formatted = formatMoney(amount);

      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="customModal" onclick="closeModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <h2>📤 Confirmer l’envoi</h2>
            <p>Ajoute le nom du client. Le message final sera généré automatiquement.</p>

            <label>Nom du client</label>
            <input id="finalClientName" placeholder="Ex : Jean" oninput="updateFinalPreview('${formatted}')" />

            <label>Message final automatique</label>
            <div class="final-message-preview" id="finalMessagePreview">
              ✅ ${formatted} ina enda kwa ...
            </div>
            <div id="sentErrorBox" class="compact-response error" style="display:none;"></div>

            <label>Capture transaction</label>
            <input type="file" id="receiptImage" accept="image/*" onchange="previewReceiptImage(event)" />

            <div class="receipt-preview" id="receiptPreview">
              <span>📷 Aucune capture sélectionnée</span>
            </div>

            ${audioRecorderHTML()}

            <div class="modal-actions">
              <button class="small-btn danger-btn" onclick="closeModal()">Annuler</button>
             <button class="small-btn success-btn" onclick="confirmSent(${id}, ${amount})">Confirmer envoyé</button>
            </div>
          </div>
        </div>
      `);

      bindAudioButtons();
    }

    function showSentError(message) {
      const box = document.getElementById("sentErrorBox");

      if (!box) {
        showPopup("error", "Erreur", message);
        return;
      }

      box.style.display = "block";
      box.innerHTML = `❌ ${message}`;
      box.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function updateFinalPreview(amountText) {
      const name = document.getElementById("finalClientName").value.trim();
      document.getElementById("finalMessagePreview").textContent =
        `✅ ${amountText} ina enda kwa ${name || "..."}.`;
    }
    async function confirmSent(id, amount) {
      const final_client_name = document.getElementById("finalClientName").value.trim();
      const receipt = document.getElementById("receiptImage").files[0];
      const agencyId = localStorage.getItem("selected_agency_id");

      if (!final_client_name) {
        showSentError("Nom du client obligatoire.");
        return;
      }

      if (!receipt) {
        showSentError("Ajoute la capture de la transaction avant de confirmer.");
        return;
      }

      if (!agentAudioBlob) {
        showSentError("Ajoute un audio agent avant de confirmer l’envoi.");
        return;
      }

      try {
        const balanceRes = await fetch(
`${API_URL}/report?mode=global&agency_id=${agencyId}`,
{ headers }
);
        const balanceData = await balanceRes.json();

        if (balanceData.success) {
          const cashRemaining = Number(
            balanceData.report.cash_remaining || balanceData.report.balance || 0
          );

          if (Number(amount) > cashRemaining) {
            showSentError(
              `Fonds insuffisants. Reste caisse disponible : ${formatMoney(cashRemaining)}.`
            );
            return;
          }
        }

        const formData = new FormData();
        formData.append("final_client_name", final_client_name);
        formData.append("validated_by", user.id);
        formData.append("receipt", receipt);

        const res = await fetch(`${API_URL}/transactions/sent/${id}`, {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`
          },
          body: formData
        });

        const data = await res.json();

        if (!data.success) {
          showSentError(data.message || "Erreur lors de l’envoi.");
          return;
        }

        await uploadAgentAudio(id);

        closeModal();
        loadTransactions();

      } catch (error) {
        showSentError(error.message || "Serveur indisponible.");
      }
    }
    function openRejectModal(id) {
      resetAgentAudio();
      closeModal();

      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="customModal" onclick="closeModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <h2>❌ Refuser la demande</h2>
            <p>Explique pourquoi la demande est refusée. Tu peux aussi ajouter un audio.</p>

            <label>Raison du refus</label>
            <textarea id="rejectionReason" placeholder="Ex : numéro incorrect">❌ Demande refusée : </textarea>

            ${audioRecorderHTML()}

            <div class="modal-actions">
              <button class="small-btn primary-small-btn" onclick="closeModal()">Annuler</button>
              <button class="small-btn danger-btn" onclick="confirmReject(${id})">Refuser</button>
            </div>
          </div>
        </div>
      `);

      bindAudioButtons();
    }

    function confirmReject(id) {
      const rejection_reason = document.getElementById("rejectionReason").value.trim();

      if (!rejection_reason) {
        showPopup("error", "Champ obligatoire", "La raison du refus est obligatoire.");
        return;
      }

      updateStatus(id, "rejected", { rejection_reason });
    }

    function previewReceiptImage(event) {
      const file = event.target.files[0];
      const preview = document.getElementById("receiptPreview");

      if (!file) {
        preview.innerHTML = `<span>📷 Aucune capture sélectionnée</span>`;
        return;
      }

      preview.innerHTML = `<span class="loader-small"></span><strong>Chargement de la capture...</strong>`;

      const reader = new FileReader();

      reader.onload = () => {
        preview.innerHTML = `
          <img src="${reader.result}" alt="Capture transaction" />
          <strong>Capture prête</strong>
        `;
      };

      reader.readAsDataURL(file);
    }

    function audioRecorderHTML() {
      return `
        <div class="audio-card modal-audio-card">
          <div class="audio-head">
            <div>
              <h3>🎙️ Audio agent</h3>
              <p>Ajoute une réponse vocale si nécessaire.</p>
            </div>
            <span id="agentAudioStatus">Aucun audio</span>
          </div>

          <div class="voice-wave" id="agentVoiceWave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>

          <div class="audio-actions">
            <button type="button" class="small-btn primary-small-btn" id="agentStartRecordBtn">🎙️ Démarrer</button>
            <button type="button" class="small-btn danger-btn" id="agentStopRecordBtn" disabled>⏹️ Arrêter</button>
            <button type="button" class="small-btn danger-btn" id="agentDeleteAudioBtn" disabled>🗑️ Supprimer</button>
          </div>

          <audio id="agentAudioPreview" controls style="display:none;"></audio>
        </div>
      `;
    }

    function bindAudioButtons() {
      document.getElementById("agentStartRecordBtn").addEventListener("click", startAgentRecording);
      document.getElementById("agentStopRecordBtn").addEventListener("click", stopAgentRecording);
      document.getElementById("agentDeleteAudioBtn").addEventListener("click", deleteAgentAudio);
    }

    async function startAgentRecording() {
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(audioStream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
          agentAudioBlob = new Blob(audioChunks, { type: "audio/webm" });
          const audioUrl = URL.createObjectURL(agentAudioBlob);

          const preview = document.getElementById("agentAudioPreview");
          preview.src = audioUrl;
          preview.style.display = "block";

          const status = document.getElementById("agentAudioStatus");
          status.textContent = "Audio prêt";
          status.className = "audio-ready";

          document.getElementById("agentVoiceWave").classList.remove("show");
          document.getElementById("agentStartRecordBtn").disabled = false;
          document.getElementById("agentStopRecordBtn").disabled = true;
          document.getElementById("agentDeleteAudioBtn").disabled = false;

          if (audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
          }
        };

        mediaRecorder.start();

        const status = document.getElementById("agentAudioStatus");
        status.textContent = "Enregistrement...";
        status.className = "audio-recording";

        document.getElementById("agentVoiceWave").classList.add("show");
        document.getElementById("agentStartRecordBtn").disabled = true;
        document.getElementById("agentStopRecordBtn").disabled = false;
        document.getElementById("agentDeleteAudioBtn").disabled = true;

      } catch (error) {
        showPopup("error", "Micro indisponible", "Micro non autorisé ou indisponible.");
      }
    }

    function stopAgentRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }

    function deleteAgentAudio() {
      resetAgentAudio();

      const preview = document.getElementById("agentAudioPreview");
      const status = document.getElementById("agentAudioStatus");
      const wave = document.getElementById("agentVoiceWave");

      if (preview) {
        preview.src = "";
        preview.style.display = "none";
      }

      if (status) {
        status.textContent = "Aucun audio";
        status.className = "";
      }

      if (wave) wave.classList.remove("show");

      document.getElementById("agentDeleteAudioBtn").disabled = true;
    }

    function resetAgentAudio() {
      agentAudioBlob = null;
      audioChunks = [];

      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
      }
    }

    async function uploadAgentAudio(transactionId) {
      if (!agentAudioBlob) return;

      const formData = new FormData();
      formData.append("audio", agentAudioBlob, `agent-${transactionId}.webm`);
      formData.append("audio_type", "agent");

      const res = await fetch(`${API_URL}/transactions/audio/${transactionId}`, {
        method: "PUT",
        headers: {
          "Authorization": `Bearer ${token}`
        },
        body: formData
      });

      const data = await res.json();

      if (!data.success) {
        throw new Error(data.message || "Erreur upload audio agent");
      }
    }

    function openImageModal(url) {
      if (!url) return;

      const oldModal = document.getElementById("imageModal");
      if (oldModal) oldModal.remove();

      document.body.insertAdjacentHTML("beforeend", `
        <div class="image-modal" id="imageModal" onclick="closeImageModal()">
          <button class="image-close-btn" onclick="closeImageModal()">×</button>

          <div class="image-modal-content" onclick="event.stopPropagation()">
            <img src="${url}" alt="Capture transaction agrandie" />
            <p>Capture transaction</p>
          </div>
        </div>
      `);
    }

    function closeImageModal() {
      const modal = document.getElementById("imageModal");
      if (modal) modal.remove();
    }

    function closeModal() {
      resetAgentAudio();
      const modal = document.getElementById("customModal");
      if (modal) modal.remove();
    }

    function goBack() {
      window.location.href = "dashboard.html";
    }

    loadTransactions();
  </script>



</body>
