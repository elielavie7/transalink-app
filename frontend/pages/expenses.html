<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dépenses - TransaLink</title>
  <script src="../js/auth-guard.js"></script>

  <script>
    (function () {
      const theme = localStorage.getItem("transalink_theme");
      const fontScale = localStorage.getItem("transalink_font_scale") || "100";

      document.documentElement.style.fontSize = fontScale + "%";

      if (theme === "dark") {
        document.documentElement.classList.add("dark-mode-preload");
      }
    })();
  </script>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body class="app-body">
  <main class="mobile-app transaction-app">
    <header class="app-header">
      <button class="icon-btn" onclick="goBack()">←</button>
      <div>
        <h1>Dépenses</h1>
        <p>Frais • Retraits • Corrections</p>
      </div>
      <button class="notif-btn" onclick="openCreateModal()">➕</button>
    </header>

    <section class="requests-page">
      <div class="mini-card status-rejected" id="expenseSummary">
        <p>Total des dépenses</p>
        <strong>0 FC</strong>
      </div>

      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Rechercher un motif..." oninput="applyFilters()" />

        <select id="periodFilter" onchange="applyFilters()">
          <option value="today">Aujourd’hui</option>
          <option value="week">Cette semaine</option>
          <option value="month">Ce mois</option>
          <option value="all">Tout</option>
        </select>

        <button type="button" class="calendar-filter-btn" onclick="openDateModal()">
          📅 <span id="selectedDateLabel">Date</span>
        </button>
      </div>

      <div class="requests-list" id="expenseList">
        <p class="empty-text">Chargement...</p>
      </div>
    </section>
  </main>
  <script src="../js/config.js"></script>

  <script src="../js/app-settings.js"></script>
  <script src="../js/app-nav.js"></script>
  <script>
    const token = localStorage.getItem("transalink_token");
    const user = JSON.parse(localStorage.getItem("transalink_user"));

    if (!token || !user) window.location.href = "../index.html";

    if (user.role !== "agent") {
      showAppModal(
        "error",
        "Accès refusé",
        "Cette page est réservée à l'agent."
      );
      window.location.href = "dashboard.html";
    }

    const headers = {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`,
    };

    let expenses = [];
    let filteredExpenses = [];
    let selectedDateFilter = "";

    function goBack() {
      window.location.href = "dashboard.html";
    }

    function formatMoney(amount) {
      return Number(amount || 0).toLocaleString("fr-FR") + " FC";
    }
    function showAppModal(type, title, message) {
      const oldModal = document.getElementById("appModal");
      if (oldModal) oldModal.remove();

      const isSuccess = type === "success";

      document.body.insertAdjacentHTML("beforeend", `
    <div class="custom-modal" id="appModal" onclick="closeAppModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h2>${isSuccess ? "✅" : "⚠️"} ${title}</h2>
        <p>${message}</p>

        <div class="modal-actions">
          <button class="small-btn ${isSuccess ? "success-btn" : "danger-btn"}"
                  onclick="closeAppModal()">
            OK
          </button>
        </div>
      </div>
    </div>
  `);
    }

    function closeAppModal() {
      const modal = document.getElementById("appModal");
      if (modal) modal.remove();
    }

    function parseMoney(value) {
      return Number(String(value || "").replace(/\D/g, "")) || 0;
    }

    function formatExpenseAmount(input) {
      const value = parseMoney(input.value);
      input.value = value ? value.toLocaleString("fr-FR") : "";
    }

    function isSameDay(date1, date2) {
      return date1.getDate() === date2.getDate()
        && date1.getMonth() === date2.getMonth()
        && date1.getFullYear() === date2.getFullYear();
    }

    function isSameWeek(date) {
      const today = new Date();
      const currentDay = today.getDay() || 7;
      const monday = new Date(today);
      monday.setDate(today.getDate() - currentDay + 1);
      monday.setHours(0, 0, 0, 0);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      sunday.setHours(23, 59, 59, 999);
      return date >= monday && date <= sunday;
    }

    function isSameMonth(date) {
      const today = new Date();
      return date.getMonth() === today.getMonth()
        && date.getFullYear() === today.getFullYear();
    }

    function isSelectedDate(date) {
      if (!selectedDateFilter) return true;
      const selected = new Date(selectedDateFilter);
      const target = new Date(date);
      return selected.getFullYear() === target.getFullYear()
        && selected.getMonth() === target.getMonth()
        && selected.getDate() === target.getDate();
    }

    async function loadExpenses() {
      try {
        const res = await fetch(`${API_URL}/expenses`, { headers });
        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        expenses = data.expenses || [];
        applyFilters();
      } catch (error) {
        expenseList.innerHTML = `<p class="empty-text">Impossible de charger les dépenses.</p>`;
      }
    }

    function applyFilters() {
      const search = document.getElementById("searchInput").value.toLowerCase().trim();
      const period = document.getElementById("periodFilter").value;

      filteredExpenses = expenses.filter(item => {
        const createdAt = new Date(item.created_at);

        const matchSearch =
          !search ||
          String(item.reason || "").toLowerCase().includes(search) ||
          String(item.amount || "").toLowerCase().includes(search);

        let matchPeriod = true;

        if (selectedDateFilter) {
          matchPeriod = isSelectedDate(createdAt);
        } else {
          if (period === "today") matchPeriod = isSameDay(createdAt, new Date());
          if (period === "week") matchPeriod = isSameWeek(createdAt);
          if (period === "month") matchPeriod = isSameMonth(createdAt);
        }

        return matchSearch && matchPeriod;
      });

      renderExpenses();
    }

    function updateSummary() {
      const total = filteredExpenses.reduce((sum, item) => sum + Number(item.amount || 0), 0);

      document.getElementById("expenseSummary").innerHTML = `
        <p>Total des dépenses</p>
        <strong>${formatMoney(total)}</strong>
      `;
    }

    function renderExpenses() {
      updateSummary();

      if (filteredExpenses.length === 0) {
        expenseList.innerHTML = `<p class="empty-text">Aucune dépense trouvée.</p>`;
        return;
      }

      expenseList.innerHTML = filteredExpenses.map(item => `
        <div class="request-card compact-request-card expense-card">
          <div class="request-top">
            <div>
              <h3>${formatMoney(item.amount)}</h3>
              <p>${item.reason}</p>
            </div>
            <span class="status-pill rejected">Dépense</span>
          </div>

          <div class="request-info compact-info">
            <p><strong>Motif :</strong> ${item.reason}</p>
            <p><strong>Ajouté par :</strong> ${item.created_by_name || "Agent"}</p>
            <p><strong>Date :</strong> ${new Date(item.created_at).toLocaleString("fr-FR")}</p>
          </div>

          <div class="request-actions">
            <button class="small-btn danger-btn" onclick="askDeleteExpense(${item.id})">
              Supprimer
            </button>
          </div>
        </div>
      `).join("");
    }

    function openCreateModal() {
      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="createExpenseModal" onclick="closeCreateModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <h2>📉 Nouvelle dépense</h2>
            <p>Ajouter une dépense ou un frais retiré de la caisse.</p>

            <label>Montant</label>
            <input type="text"
              id="expenseAmount"
              placeholder="Ex: 50.000"
              oninput="formatExpenseAmount(this)" />

            <label>Motif de la dépense</label>
            <textarea id="expenseReason"
              placeholder="Ex: Transport, achat ..."></textarea>

            <div class="modal-actions">
              <button class="small-btn primary-small-btn" onclick="closeCreateModal()">Annuler</button>
              <button class="small-btn success-btn" onclick="openConfirmCreateModal()">Continuer</button>
            </div>
          </div>
        </div>
      `);
    }

    function closeCreateModal() {
      const modal = document.getElementById("createExpenseModal");
      if (modal) modal.remove();
    }

    function openConfirmCreateModal() {
      const amount = parseMoney(document.getElementById("expenseAmount").value);
      const reason = document.getElementById("expenseReason").value.trim();

      if (!amount || amount <= 0) {
        showAppModal(
          "error",
          "Montant invalide",
          "Veuillez entrer un montant valide."
        );
        return;
      }

      if (!reason) {
        showAppModal(
          "error",
          "Motif obligatoire",
          "Veuillez entrer un motif."
        );
        return;
      }

      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="confirmExpenseModal" onclick="closeConfirmCreateModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <h2>Confirmer la dépense</h2>
            <p>Vérifie bien avant d’enregistrer cette dépense.</p>

            <div class="final-message-preview">
              <p><strong>Montant :</strong> ${formatMoney(amount)}</p>
              <hr>
              <p><strong>Motif :</strong><br>${reason}</p>
            </div>

            <div class="modal-actions">
              <button class="small-btn primary-small-btn" onclick="closeConfirmCreateModal()">Retour</button>
              <button class="small-btn danger-btn" onclick="createExpense()">Enregistrer</button>
            </div>
          </div>
        </div>
      `);
    }

    function closeConfirmCreateModal() {
      const modal = document.getElementById("confirmExpenseModal");
      if (modal) modal.remove();
    }

    async function createExpense() {
      const amount = parseMoney(document.getElementById("expenseAmount").value);
      const reason = document.getElementById("expenseReason").value.trim();

      if (!amount || amount <= 0) {
        showAppModal(
          "error",
          "Montant invalide",
          "Veuillez entrer un montant valide."
        );
        return;
      }

      if (!reason) {
        showAppModal(
          "error",
          "Motif obligatoire",
          "Veuillez entrer un motif."
        );
        return;
      }

      try {
        const res = await fetch(`${API_URL}/expenses/create`, {
          method: "POST",
          headers,
          body: JSON.stringify({ amount, reason })
        });

        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        closeConfirmCreateModal();
        closeCreateModal();
        loadExpenses();
      } catch (error) {
        showAppModal(
          "error",
          "Création impossible",
          error.message || "Erreur création dépense"
        );
      }
    }

    function askDeleteExpense(id) {
      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="deleteExpenseModal" onclick="closeDeleteModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <h2>Supprimer dépense</h2>
            <p>Voulez-vous vraiment supprimer cette dépense ?</p>

            <div class="modal-actions">
              <button class="small-btn primary-small-btn" onclick="closeDeleteModal()">Annuler</button>
              <button class="small-btn danger-btn" onclick="deleteExpense(${id})">Supprimer</button>
            </div>
          </div>
        </div>
      `);
    }

    function closeDeleteModal() {
      const modal = document.getElementById("deleteExpenseModal");
      if (modal) modal.remove();
    }

    async function deleteExpense(id) {
      try {
        const res = await fetch(`${API_URL}/expenses/${id}`, {
          method: "DELETE",
          headers
        });

        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        closeDeleteModal();
        loadExpenses();
      } catch (error) {
        showAppModal(
          "error",
          "Suppression impossible",
          error.message || "Erreur suppression"
        );
      }
    }

    function openDateModal() {
      const oldModal = document.getElementById("dateModal");
      if (oldModal) oldModal.remove();

      document.body.insertAdjacentHTML("beforeend", `
        <div class="custom-modal" id="dateModal" onclick="closeDateModal()">
          <div class="modal-box" onclick="event.stopPropagation()">
            <h2>📅 Filtrer par date</h2>
            <p>Choisis une date précise.</p>

            <label>Date voulue</label>
            <input type="date" id="singleDateInput" value="${selectedDateFilter}" />

            <div class="modal-actions">
              <button class="small-btn danger-btn" onclick="clearDateFilter()">Effacer</button>
              <button class="small-btn success-btn" onclick="applySingleDateFilter()">Appliquer</button>
            </div>
          </div>
        </div>
      `);
    }

    function closeDateModal() {
      const modal = document.getElementById("dateModal");
      if (modal) modal.remove();
    }

    function applySingleDateFilter() {
      selectedDateFilter = document.getElementById("singleDateInput").value;

      document.getElementById("selectedDateLabel").textContent =
        selectedDateFilter
          ? new Date(selectedDateFilter).toLocaleDateString("fr-FR")
          : "Date";

      closeDateModal();
      applyFilters();
    }

    function clearDateFilter() {
      selectedDateFilter = "";
      document.getElementById("selectedDateLabel").textContent = "Date";
      closeDateModal();
      applyFilters();
    }

    loadExpenses();
  </script>



</body>

</html>
